name: msk_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # --- System & Build (Let Server Provide These) ---
  # - _libgcc_mutex=0.1
  # - _openmp_mutex=5.1
  # - ld_impl_linux-64=2.44
  # - libgcc=15.2.0
  # - libgcc-ng=15.2.0
  # - libstdcxx=15.2.0
  # - libstdcxx-ng=15.2.0
  # - libgfortran=15.2.0
  # - intel-openmp=2023.0.0

  # --- Core Python & ML ---
  - python=3.10.19
  - pytorch=2.5.1
  - pytorch-cuda=12.4  # <--- Crucial: This triggers the right NVIDIA libs for the server
  - torchaudio=2.5.1
  - numpy=1.21.6
  - scipy=1.10.1
  - sympy=1.13.1
  - pillow=12.0.0

  # --- Domain Specific (MSK/Robotics) ---
  - chumpy=0.70
  - ffmpeg=4.2.2
  - pyyaml=6.0.3
  - h5py=3.10.0
  
  # --- Graphics & Visualization ---
  - matplotlib-inline=0.2.1
  - seaborn=0.13.2
  - plotly=4.14.3
  - pyqt=6.9.1
  - qtbase=6.9.2

  # --- Utility & Shell ---
  # - ca-certificates=2025.12.2
  - openssl=3.0.18
  - pip=25.3
  - tqdm=4.66.2
  - requests=2.32.5

  - pip:
      # --- Private/Custom Projects ---
      # - -e /path/to/your/local/repo  <-- REMOVE OR UPDATE TO SERVER PATH
      
      # --- Simulation & RL ---
      - mujoco==3.1.2
      - mujoco-py==2.1.2.14
      - gym==0.26.2
      - gymnasium==0.29.1
      - wandb==0.23.1
      - omegaconf==2.3.0
      - hydra-core==1.3.2
      
      # --- Computational Geometry/Math ---
      - numpy-stl==3.1.1
      - warp-lang==0.10.1
      - scikit-learn==1.3.2
      - pandas==2.0.3

      # --- Keep standard pip utilities ---
      - setuptools==80.9.0
      - wheel==0.45.1